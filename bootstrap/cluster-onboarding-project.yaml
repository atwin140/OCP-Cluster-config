# AppProject – governs all cluster-config Applications generated by the ApplicationSet.
# These cluster-config Applications run on the hub cluster and only create child
# ArgoCD Application and AppProject CRs in the openshift-gitops namespace.
# They do NOT directly deploy workload resources to spoke clusters; that is the
# responsibility of each child Application (remediation, compliance-operator, etc.).
#
# Wave 0: project must exist before the ApplicationSet (wave 1).
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: cluster-onboarding
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/part-of: cluster-onboarding
    tier: app-of-apps
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  description: "Cluster onboarding – manages per-cluster cluster-config Applications"

  # Replace with your actual repository URL.
  sourceRepos:
  - "https://github.com/REPLACE_ME/OCP-Cluster-config.git"
  # cluster-config Applications only write Application/AppProject CRs to the hub.
  destinations:
  - namespace: openshift-gitops
    server: https://kubernetes.default.svc
  # Application and AppProject are namespace-scoped CRs living in openshift-gitops.
  namespaceResourceWhitelist:
  - group: argoproj.io
    kind: Application
  - group: argoproj.io
    kind: AppProject

  orphanedResources:
    warn: true

  roles: []
