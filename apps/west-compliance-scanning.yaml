# Argo CD Application – west cluster compliance scanning.
# Mirror of east-compliance-scanning.yaml targeting the west cluster and
# west Kustomize overlay (different scan schedule and storage class).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: west-compliance-scanning
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/part-of: compliance-scanning
    cluster.name: west
  annotations:
    # Wave 1: deploy after the AppProject (wave 0) has been synced.
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: compliance-scanning

  source:
    # Replace with your actual repository URL.
    repoURL: "https://github.com/REPLACE_ME/OCP-Cluster-config.git"
    targetRevision: HEAD
    path: overlays/west

  destination:
    # Replace with the west cluster API server URL as registered in Argo CD.
    server: "https://west-cluster-api.example.com:6443"
    namespace: openshift-compliance

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=false
    - ServerSideApply=true
    - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  ignoreDifferences:
  - group: compliance.openshift.io
    kind: ScanSetting
    jsonPointers:
    - /status
  - group: compliance.openshift.io
    kind: ScanSettingBinding
    jsonPointers:
    - /status

  revisionHistoryLimit: 10
