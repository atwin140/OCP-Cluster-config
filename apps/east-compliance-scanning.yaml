# Argo CD Application – east cluster compliance scanning.
# Points to overlays/east so only the east-specific Kustomize build is deployed
# to the east cluster API endpoint.
#
# Sync options:
#   CreateNamespace=false   – openshift-compliance already exists (operator created it)
#   ServerSideApply=true    – required for CRDs to avoid annotation size limits and
#                             to let the Compliance Operator manage its own fields
#   RespectIgnoreDifferences=true – honours any ignoreDifferences entries below
#
# retry.backoff provides exponential back-off if the cluster is briefly unavailable
# during a sync (e.g., during a maintenance window).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: east-compliance-scanning
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/part-of: compliance-scanning
    cluster.name: east
  annotations:
    # Wave 1: deploy after the AppProject (wave 0) has been synced.
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: compliance-scanning

  source:
    # Replace with your actual repository URL.
    repoURL: "https://github.com/REPLACE_ME/OCP-Cluster-config.git"
    targetRevision: HEAD
    path: overlays/east

  destination:
    # Replace with the east cluster API server URL as registered in Argo CD.
    server: "https://east-cluster-api.example.com:6443"
    namespace: openshift-compliance

  syncPolicy:
    automated:
      # Remove resources from the cluster when they are deleted from Git.
      prune: true
      # Revert out-of-band changes automatically (drift detection).
      selfHeal: true
    syncOptions:
    - CreateNamespace=false
    - ServerSideApply=true
    - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  # Ignore operator-managed status and generated fields to prevent constant drift.
  ignoreDifferences:
  - group: compliance.openshift.io
    kind: ScanSetting
    jsonPointers:
    - /status
  - group: compliance.openshift.io
    kind: ScanSettingBinding
    jsonPointers:
    - /status

  revisionHistoryLimit: 10
