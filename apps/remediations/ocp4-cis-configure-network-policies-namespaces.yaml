# Control: ocp4-cis-configure-network-policies-namespaces
# NIST SP 800-53 Rev. 5
# Primary controls:
# - SC-7 - Boundary Protection
# - AC-4 - Information Flow Enforcement
# Link: https://csrc.nist.gov/projects/risk-management/sp800-53-controls#SC-7
# Publication: https://csrc.nist.gov/pubs/sp/800/53/r5/upd1/final
# Intent: Enforce namespace-level segmentation with deny-by-default network policy.
# Note: Apply per application namespace. Do not apply blindly to system namespaces.

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nginx-default-deny
  namespace: nginx
spec:
  podSelector:
    matchLabels:
      app: nginx
  policyTypes:
  - Ingress
  - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nginx-allow-ingress
  namespace: nginx
spec:
  podSelector:
    matchLabels:
      app: nginx
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          policy-group.network.openshift.io/ingress: ""
    ports:
    - protocol: TCP
      port: 80
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nginx-allow-egress
  namespace: nginx
spec:
  podSelector:
    matchLabels:
      app: nginx
  policyTypes:
  - Egress
  egress:
  # Allow DNS resolution
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
  # Allow HTTPS for potential external connections
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
