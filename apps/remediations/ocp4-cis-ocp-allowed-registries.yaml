# Control: ocp4-cis-ocp-allowed-registries
# NIST SP 800-53 Rev. 5
# Primary controls:
# - SA-12 - Supply Chain Protection
# - SI-7 - Software, Firmware, and Information Integrity
# - CM-7 - Least Functionality
# Link: https://csrc.nist.gov/projects/risk-management/sp800-53-controls#SA-12
# Publication: https://csrc.nist.gov/pubs/sp/800/53/r5/upd1/final
# Intent: Restrict runtime image pulls to approved registries only.
# WARNING: Include all required OpenShift, Red Hat, mirror, and internal registries for your environment.

# Control: ocp4-cis-ocp-allowed-registries-for-import
# NIST SP 800-53 Rev. 5
# Primary controls:
# - SA-12 - Supply Chain Protection
# - SI-7 - Software, Firmware, and Information Integrity
# Link: https://csrc.nist.gov/projects/risk-management/sp800-53-controls#SI-7
# Publication: https://csrc.nist.gov/pubs/sp/800/53/r5/upd1/final
# Intent: Restrict image imports to approved registries only.

apiVersion: config.openshift.io/v1
kind: Image
metadata:
  name: cluster
spec:
  registrySources:
    allowedRegistries:
    - registry.redhat.io
    - quay.io
    - image-registry.openshift-image-registry.svc:5000
    # - your-registry.example.com
  allowedRegistriesForImport:
  - domainName: registry.redhat.io
    insecure: false
  - domainName: quay.io
    insecure: false
  # - domainName: your-registry.example.com
  #   insecure: false
