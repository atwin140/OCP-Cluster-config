# Kustomize manifest for the apps/ directory.
# The app-of-apps Application (app-of-apps.yaml) points Argo CD at this
# directory. Argo CD builds the Kustomize output and applies it to the
# openshift-gitops namespace on the hub cluster, creating the AppProject and
# both cluster Applications in a single sync.
#
# Ordering is controlled by argocd.argoproj.io/sync-wave annotations:
#   wave 0 → compliance-app-project.yaml   (AppProject)
#   wave 1 → east/west-compliance-scanning.yaml  (Applications)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: openshift-gitops

resources:
- compliance-app-project.yaml
- east-compliance-scanning.yaml
- west-compliance-scanning.yaml
