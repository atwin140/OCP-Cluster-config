# =============================================================================
# PersistentVolumeClaim — Application data storage
# =============================================================================
# For the SQLite monolith deployment, one PVC stores the database file.
# For the split PostgreSQL + MongoDB deployment, each stateful component
# gets its own PVC (see postgres.yaml and mongodb.yaml for their PVCs).
#
# Storage class notes:
#   - Leave storageClassName blank to use the cluster default
#   - For OpenShift on cloud: use gp3-csi (AWS), managed-csi (Azure),
#     standard-csi (GCP), or ocs-storagecluster-ceph-rbd (ODF/Ceph)
#   - For local OpenShift (CRC/SNO): use "standard" or leave blank
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: shark-db-data
  namespace: shark-db
  labels:
    app.kubernetes.io/name: shark-db
    app.kubernetes.io/part-of: shark-database
spec:
  accessModes:
    - ReadWriteOnce   # RWO is fine for single-replica SQLite
  resources:
    requests:
      storage: 1Gi
  # Uncomment and set to your cluster's storage class:
  # storageClassName: gp3-csi
---
# PVC for PostgreSQL (production split deployment)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: shark-db-postgres-data
  namespace: shark-db
  labels:
    app.kubernetes.io/name: shark-db-postgres
    app.kubernetes.io/part-of: shark-database
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  # storageClassName: gp3-csi
---
# PVC for MongoDB (production split deployment)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: shark-db-mongodb-data
  namespace: shark-db
  labels:
    app.kubernetes.io/name: shark-db-mongodb
    app.kubernetes.io/part-of: shark-database
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  # storageClassName: gp3-csi
