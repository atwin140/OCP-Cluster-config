# =============================================================================
# ConfigMap — Non-sensitive application configuration
# =============================================================================
# Sensitive values (DB passwords, JWT secrets) belong in Secret objects.
# Everything here is safe to commit to Git.
#
# Reference in Deployment via:
#   envFrom:
#     - configMapRef:
#         name: shark-db-config
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: shark-db-config
  namespace: shark-db
  labels:
    app.kubernetes.io/name: shark-db
    app.kubernetes.io/part-of: shark-database
data:
  # Application behaviour
  NODE_ENV: "production"
  PORT: "8080"
  LOG_LEVEL: "info"

  # Database paths (for SQLite monolith; replace with connection strings for PostgreSQL/MongoDB)
  SQLITE_PATH: "/app/data/shark_db.sqlite"

  # --- Production database config (PostgreSQL) ---
  # Uncomment and set in the overlay when using PostgreSQL
  # PG_HOST: "shark-db-postgres"
  # PG_PORT: "5432"
  # PG_DATABASE: "sharkdb"
  # PG_USER: "sharkdb"   # password goes in Secret

  # --- Production database config (MongoDB) ---
  # MONGO_HOST: "shark-db-mongodb"
  # MONGO_PORT: "27017"
  # MONGO_DATABASE: "sharkdb"
  # MONGO_USER: "sharkdb"   # password goes in Secret

  # Session config
  SESSION_MAX_AGE_HOURS: "24"

  # CORS allowed origins (comma-separated)
  CORS_ORIGINS: "https://shark-db.apps.your-cluster.example.com"
