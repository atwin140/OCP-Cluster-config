# =============================================================================
# ServiceAccount, Role, and RoleBinding
# =============================================================================
# A dedicated ServiceAccount provides:
#   1. A clear identity for the pods (visible in audit logs)
#   2. Least-privilege — the SA has only the permissions it needs
#   3. In OpenShift: can be used to assign SCCs if needed
#
# For most demo scenarios the app does not need any Kubernetes API access,
# so the SA has no special roles. The Role/RoleBinding below is a template
# for future use (e.g., if you add leader-election or config-watch logic).
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: shark-db-sa
  namespace: shark-db
  labels:
    app.kubernetes.io/name: shark-db
    app.kubernetes.io/part-of: shark-database
  annotations:
    # Uncomment to link an IAM role (AWS IRSA) for cloud storage access:
    # eks.amazonaws.com/role-arn: arn:aws:iam::123456789:role/shark-db-role
automountServiceAccountToken: false  # No Kube API access needed
---
# Role — empty template; add rules if the app needs Kubernetes API access
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: shark-db-role
  namespace: shark-db
  labels:
    app.kubernetes.io/name: shark-db
rules: []   # No Kubernetes API permissions needed for this app
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: shark-db-rolebinding
  namespace: shark-db
  labels:
    app.kubernetes.io/name: shark-db
subjects:
  - kind: ServiceAccount
    name: shark-db-sa
    namespace: shark-db
roleRef:
  kind: Role
  name: shark-db-role
  apiGroup: rbac.authorization.k8s.io
