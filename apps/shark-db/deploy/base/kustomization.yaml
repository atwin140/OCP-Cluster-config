# =============================================================================
# Kustomize — Base configuration
# =============================================================================
# This is the base layer. Overlays (dev, prod) customize it with patches.
#
# Usage:
#   kubectl apply -k deploy/base/            # apply base directly
#   kubectl apply -k deploy/overlays/dev/    # apply dev overlay
#   kubectl apply -k deploy/overlays/prod/   # apply prod overlay
#
# Preview rendered manifests without applying:
#   kubectl kustomize deploy/overlays/dev/
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: shark-db

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  - secret.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - route.yaml
  # - ingress.yaml   # Uncomment for vanilla Kubernetes

commonLabels:
  app.kubernetes.io/name: shark-db
  app.kubernetes.io/part-of: shark-database
  app.kubernetes.io/managed-by: kustomize

# Image transformer — update the image tag here instead of editing deployment.yaml
images:
  - name: quay.io/sharkdb/shark-db
    newTag: "1.0.0"
