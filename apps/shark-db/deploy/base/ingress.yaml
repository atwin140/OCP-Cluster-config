# =============================================================================
# Ingress — vanilla Kubernetes alternative to OpenShift Route
# =============================================================================
# Use this instead of route.yaml when deploying on vanilla Kubernetes
# (EKS, GKE, AKS, k3s, etc.) with an Ingress controller (nginx, Traefik, etc.)
#
# Prerequisites:
#   kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/cloud/deploy.yaml
#
# Apply:
#   kubectl apply -f ingress.yaml
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shark-db
  namespace: shark-db
  labels:
    app.kubernetes.io/name: shark-db
    app.kubernetes.io/part-of: shark-database
  annotations:
    # Nginx Ingress controller annotations
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "8m"
    # cert-manager annotations for automatic TLS certificates
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  # TLS configuration — requires a TLS secret or cert-manager
  # tls:
  #   - hosts:
  #       - shark-db.example.com
  #     secretName: shark-db-tls
  rules:
    - host: shark-db.example.com   # Change to your actual hostname
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: shark-db
                port:
                  name: http
