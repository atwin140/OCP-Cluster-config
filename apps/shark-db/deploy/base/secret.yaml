# =============================================================================
# Secret — Sensitive configuration values
# =============================================================================
# IMPORTANT: Do NOT commit real values to Git.
# This file contains placeholder values only.
#
# In a real GitOps workflow, secrets are managed by one of:
#   1. Sealed Secrets (Bitnami) — encrypted secrets safe for Git
#   2. External Secrets Operator — syncs from Vault / AWS Secrets Manager
#   3. OpenShift Secrets in cluster (created out-of-band, not in Git)
#   4. ArgoCD Vault Plugin — injects secrets at sync time
#
# For local demo, you can create the secret manually:
#   kubectl create secret generic shark-db-secret \
#     --from-literal=SESSION_SECRET="$(openssl rand -hex 32)" \
#     --from-literal=PG_PASSWORD="changeme" \
#     --from-literal=MONGO_PASSWORD="changeme" \
#     -n shark-db
#
# Values here are base64-encoded:
#   echo -n "changeme" | base64  → Y2hhbmdlbWU=
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: shark-db-secret
  namespace: shark-db
  labels:
    app.kubernetes.io/name: shark-db
    app.kubernetes.io/part-of: shark-database
  annotations:
    # Signal to Sealed Secrets controller or ESO that this needs encryption
    # sealedsecrets.bitnami.com/managed: "true"
type: Opaque
data:
  # Session signing secret — CHANGE THIS to a real random value
  # echo -n "your-secret-here" | base64
  SESSION_SECRET: Y2hhbmdlbWU=

  # PostgreSQL password (for production PG deployment)
  PG_PASSWORD: Y2hhbmdlbWU=

  # MongoDB password (for production MongoDB deployment)
  MONGO_PASSWORD: Y2hhbmdlbWU=
