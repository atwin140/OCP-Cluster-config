# =============================================================================
# Kustomize Overlay — Production environment
# =============================================================================
# Differences from base:
#   - Production image tag (pinned, not :latest)
#   - Higher resource limits
#   - HPA (Horizontal Pod Autoscaler) annotation
#   - Custom prod Route hostname
#   - Production ConfigMap values
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: shark-db

resources:
  - ../../base

# Patch deployment for production sizing
patches:
  - target:
      kind: Deployment
      name: shark-db
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "200m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "1Gi"
      - op: replace
        path: /spec/replicas
        value: 1

  # Production ConfigMap overrides
  - target:
      kind: ConfigMap
      name: shark-db-config
    patch: |-
      - op: replace
        path: /data/LOG_LEVEL
        value: "warn"
      - op: replace
        path: /data/CORS_ORIGINS
        value: "https://shark-db.apps.prod-cluster.example.com"

  # Production Route hostname
  - target:
      kind: Route
      name: shark-db
    patch: |-
      - op: add
        path: /spec/host
        value: shark-db.apps.prod-cluster.example.com

images:
  - name: quay.io/sharkdb/shark-db
    newTag: "1.2.0"   # Pinned production release tag
