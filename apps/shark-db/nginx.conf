# nginx.conf — used by Dockerfile.frontend for split frontend/backend deployment
# Proxies /api requests to the backend service

server {
    listen 8080;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # Serve the React SPA
    root /usr/share/nginx/html;
    index index.html;

    # Forward all /api/* requests to the backend service
    # Set NGINX_BACKEND_URL at runtime via envsubst or hardcode the service name
    location /api/ {
        proxy_pass ${NGINX_BACKEND_URL};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — all routes return index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Disable access log for health probes
    location /api/health {
        access_log off;
        proxy_pass ${NGINX_BACKEND_URL};
    }
}
