# =============================================================================
# ArgoCD ApplicationSet — Multi-environment automation
# =============================================================================
# An ApplicationSet generates multiple Application objects from a template.
# This eliminates copy-paste between application-dev.yaml and application-prod.yaml.
#
# Use ApplicationSet when you have many environments or clusters to deploy to.
# For simple 2-environment demos, individual Application manifests are clearer.
#
# This example generates one Application per environment using the List generator.
# Other generator types: Git, Matrix, Cluster, SCM Provider, Pull Request.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: shark-db-appset
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: shark-database
spec:
  generators:
    # List generator — one item per environment
    - list:
        elements:
          - env: dev
            namespace: shark-db-dev
            revision: main
            autoSync: "true"
            imageTag: dev
          - env: prod
            namespace: shark-db
            revision: v1.2.0
            autoSync: "false"
            imageTag: "1.2.0"

  template:
    metadata:
      name: "shark-db-{{env}}"
      namespace: argocd
      labels:
        app.kubernetes.io/name: shark-db
        app.kubernetes.io/part-of: shark-database
        environment: "{{env}}"
    spec:
      project: shark-database
      source:
        repoURL: https://github.com/your-org/shark-db.git
        targetRevision: "{{revision}}"
        path: "deploy/overlays/{{env}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{namespace}}"
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
          - PruneLast=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
