# =============================================================================
# ArgoCD Application — Production environment
# =============================================================================
# Production differs from dev in two important ways:
#   1. Tracks a specific release TAG (not a branch) — pinned, deterministic
#   2. Automated sync is DISABLED — a human must approve production syncs
#      (manual sync via ArgoCD UI or `argocd app sync shark-db-prod`)
#
# This models a real GitOps promotion workflow:
#   dev  (auto-sync, main branch)  →  manual review  →  prod (manual sync, tag)
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shark-db-prod
  namespace: argocd
  labels:
    app.kubernetes.io/name: shark-db
    app.kubernetes.io/part-of: shark-database
    environment: prod
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: shark-database

  source:
    repoURL: https://github.com/your-org/shark-db.git
    # Pinned to a release tag — production always deploys a known-good version
    targetRevision: v1.2.0
    path: deploy/overlays/prod

  destination:
    server: https://kubernetes.default.svc
    namespace: shark-db

  syncPolicy:
    # NO automated sync in production — a human must trigger it
    # automated: {}   # commented out intentionally

    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true

    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m

  revisionHistoryLimit: 20
