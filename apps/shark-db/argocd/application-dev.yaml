# =============================================================================
# ArgoCD Application — Development environment
# =============================================================================
# This Application tells ArgoCD:
#   "Watch the 'deploy/overlays/dev' folder in this Git repo.
#    Keep the shark-db-dev namespace in sync with whatever is in Git."
#
# GitOps flow:
#   1. Developer pushes a change to deploy/overlays/dev/kustomization.yaml
#      (e.g., updates the image tag to a new build)
#   2. ArgoCD detects drift (repo != cluster state)
#   3. ArgoCD syncs — applies the Kustomize-rendered manifests to the cluster
#   4. The pod is restarted with the new image
#   5. The detail page shows the new updated_by / updated_at on shark records
#
# Apply:
#   kubectl apply -f argocd/application-dev.yaml -n argocd
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shark-db-dev
  namespace: argocd
  labels:
    app.kubernetes.io/name: shark-db
    app.kubernetes.io/part-of: shark-database
    environment: dev
  # Finalizer — prevents ArgoCD from orphaning resources when App is deleted
  # Remove this if you want resources to survive app deletion
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: shark-database

  # Source — where to find the manifests
  source:
    repoURL: https://github.com/your-org/shark-db.git
    targetRevision: main   # Branch, tag, or commit SHA to track
    path: deploy/overlays/dev

  # Destination — where to deploy
  destination:
    server: https://kubernetes.default.svc
    namespace: shark-db-dev

  # Sync policy
  syncPolicy:
    # Automated sync — ArgoCD will automatically sync when drift is detected
    automated:
      prune: true     # Remove resources that are no longer in Git
      selfHeal: true  # Re-apply if someone manually changes resources in cluster
      allowEmpty: false

    syncOptions:
      - CreateNamespace=true       # Create shark-db-dev namespace if it doesn't exist
      - PrunePropagationPolicy=foreground  # Wait for dependent resources before pruning
      - PruneLast=true             # Prune removed resources after applying new ones
      - RespectIgnoreDifferences=true

    # Retry policy — retry sync on failure
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  # Health assessment overrides (optional)
  # ignoreDifferences:
  #   - group: apps
  #     kind: Deployment
  #     jsonPointers:
  #       - /spec/replicas   # Ignore if HPA manages replicas

  revisionHistoryLimit: 10
