# AppProject – scoped RBAC boundary for all compliance-scanning Applications.
# Restricts source repos, allowed destination clusters/namespaces, and the
# Kubernetes resource kinds Argo CD is permitted to manage.
# Keep this in wave 0 so it exists before any Application resources (wave 1+).
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: compliance-scanning
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/part-of: compliance-scanning
  annotations:
    # Wave 0: project must be ready before child Applications are created.
    argocd.argoproj.io/sync-wave: "0"
spec:
  description: "Compliance Operator STIG scanning – managed by Argo CD"

  # Replace with your actual repository URL.
  sourceRepos:
  - "https://github.com/REPLACE_ME/OCP-Cluster-config.git"

  # Allow deployment only into openshift-compliance on each registered cluster.
  # Replace server URLs with your actual cluster API endpoints.
  destinations:
  - namespace: openshift-compliance
    server: "https://east-cluster-api.example.com:6443"
  - namespace: openshift-compliance
    server: "https://west-cluster-api.example.com:6443"

  # Compliance Operator CRDs are namespace-scoped; whitelist exactly what is needed.
  namespaceResourceWhitelist:
  - group: compliance.openshift.io
    kind: ScanSetting
  - group: compliance.openshift.io
    kind: ScanSettingBinding

  # Surface a warning in the Argo CD UI if resources exist in the namespace
  # that are not tracked by this Application (helpful for drift detection).
  orphanedResources:
    warn: true

  # No additional roles needed; access is controlled by OpenShift RBAC.
  roles: []
