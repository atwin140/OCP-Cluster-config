apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-certs
  namespace: group-sync-operator
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  # Optional. Replace with your PEM certificate if your Keycloak route uses a
  # private CA. If not needed, remove this file and the `ca:` section from the
  # GroupSync manifest.
  ca.crt: |
    -----BEGIN CERTIFICATE-----
    REPLACE_WITH_YOUR_CA_CERT
    -----END CERTIFICATE-----
