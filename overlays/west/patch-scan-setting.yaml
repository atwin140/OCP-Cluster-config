# West cluster overlay – strategic-merge patch for ScanSetting.
# Changes from base:
#   schedule         → 0 7 * * *  (07:00 UTC / 00:00 PT – off-peak for west coast)
#   storageClassName → standard-csi (vSphere/on-prem default, or swap for your CSI)
#
# Only the fields that differ from the base are listed; Kustomize JSON-merges
# the object so all other base fields are preserved.
apiVersion: compliance.openshift.io/v1alpha1
kind: ScanSetting
metadata:
  name: stig-scan-setting
  namespace: openshift-compliance
spec:
  schedule: "0 7 * * *"
  rawResultStorage:
    pvAccessModes:
    - ReadWriteOnce
    rotation: 3
    size: 1Gi
    storageClassName: standard-csi
