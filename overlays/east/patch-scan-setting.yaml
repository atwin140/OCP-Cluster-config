# East cluster overlay – strategic-merge patch for ScanSetting.
# Changes from base:
#   schedule         → 0 1 * * *  (01:00 UTC / 21:00 ET – off-peak)
#   storageClassName → gp3-csi    (AWS EBS GP3, common on east AWS clusters)
#
# Only the fields that differ from the base are listed; Kustomize JSON-merges
# the object so all other base fields are preserved.
apiVersion: compliance.openshift.io/v1alpha1
kind: ScanSetting
metadata:
  name: stig-scan-setting
  namespace: openshift-compliance
spec:
  schedule: "0 1 * * *"
  rawResultStorage:
    pvAccessModes:
    - ReadWriteOnce
    rotation: 3
    size: 1Gi
    storageClassName: gp3-csi
