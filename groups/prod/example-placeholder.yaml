apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: example-placeholder
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/part-of: cluster-onboarding
    component: placeholder
    group.environment: prod
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: platform-services
  source:
    repoURL: "https://github.com/REPLACE_ME/OCP-Cluster-config.git"
    targetRevision: HEAD
    path: components/placeholders/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=false
    - ServerSideApply=true
