apiVersion: redhatcop.redhat.io/v1alpha1
kind: GroupSync
metadata:
  name: keycloak-groupsync
  namespace: group-sync-operator
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  schedule: "*/15 * * * *"
  providers:
  - name: keycloak
    keycloak:
      url: https://keycloak.apps.acm.sharkbait.tech
      realm: openshift
      loginRealm: openshift
      scope: sub
      prune: false
      credentialsSecret:
        name: keycloak-group-sync
        namespace: group-sync-operator
      ca:
        kind: ConfigMap
        name: keycloak-certs
        namespace: group-sync-operator
        key: ca.crt
      groups:
      - openshift-access
