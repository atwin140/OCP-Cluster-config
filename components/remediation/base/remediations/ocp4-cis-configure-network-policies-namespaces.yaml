# Control: ocp4-cis-configure-network-policies-namespaces
# NIST SP 800-53 Rev. 5
# Primary controls:
# - SC-7 - Boundary Protection
# - AC-4 - Information Flow Enforcement
# Intent: Enforce namespace-level segmentation with deny-by-default network policy.
# Note: This example targets the 'nginx' namespace. Duplicate and adapt for each
#       application namespace that requires CIS network policy controls.
#       Do NOT apply deny-all policies to OpenShift system namespaces.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nginx-default-deny
  namespace: nginx
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  podSelector:
    matchLabels:
      app: nginx
  policyTypes:
  - Ingress
  - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nginx-allow-ingress
  namespace: nginx
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  podSelector:
    matchLabels:
      app: nginx
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          policy-group.network.openshift.io/ingress: ""
    ports:
    - protocol: TCP
      port: 80
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nginx-allow-egress
  namespace: nginx
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  podSelector:
    matchLabels:
      app: nginx
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-dns
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
