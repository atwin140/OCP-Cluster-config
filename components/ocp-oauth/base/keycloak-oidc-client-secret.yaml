apiVersion: v1
kind: Secret
metadata:
  name: keycloak-oidc-client-secret
  namespace: openshift-config
  annotations:
    argocd.argoproj.io/sync-wave: "5"
type: Opaque
stringData:
  # Shared OIDC client secret for local clusters. Replace with your managed secret value.
  # oc get secret -n openshift-config keycloak-oidc-client-secret -o yaml | yq .data.clientSecret | base64 -d
  clientSecret: CHANGE_ME
