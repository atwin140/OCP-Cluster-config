# Kustomize manifest for components/observability/base/.
# Configures the OCP built-in monitoring stack and user workload monitoring.
# Storage class and retention are overridden per cluster via overlay patches.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- cluster-monitoring-config.yaml
- user-workload-monitoring-config.yaml

commonLabels:
  app.kubernetes.io/part-of: observability
  app.kubernetes.io/managed-by: argocd
