# Lab cluster monitoring patch: standard storage, 7d retention, smaller PVCs.
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-monitoring-config
  namespace: openshift-monitoring
data:
  config.yaml: |
    prometheusK8s:
      retention: 7d
      volumeClaimTemplate:
        spec:
          storageClassName: synology-iscsi-ext4
          resources:
            requests:
              storage: 40Gi
    alertmanagerMain:
      volumeClaimTemplate:
        spec:
          storageClassName: synology-iscsi-ext4
          resources:
            requests:
              storage: 5Gi
