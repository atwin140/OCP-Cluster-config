apiVersion: batch/v1
kind: Job
metadata:
  name: register-perses-bearer-token
  namespace: openshift-cluster-observability-operator
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 5
  template:
    spec:
      serviceAccountName: perses-sa
      restartPolicy: OnFailure
      containers:
      - name: register
        image: registry.redhat.io/ubi9:latest
        command: ["/bin/bash", "-c"]
        args:
        - |
          set -e

          SA_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)

          # With kubernetes auth enabled, the SA token IS the Perses Bearer token directly
          RESULT=$(curl -sk -X PUT \
            "https://perses:8080/api/v1/projects/openshift-cluster-observability-operator/secrets/perses-sa-bearer-token" \
            -H "Authorization: Bearer $SA_TOKEN" \
            -H 'Content-Type: application/json' \
            -d "{
              \"kind\": \"Secret\",
              \"metadata\": {
                \"name\": \"perses-sa-bearer-token\",
                \"project\": \"openshift-cluster-observability-operator\"
              },
              \"spec\": {
                \"authorization\": {\"type\": \"Bearer\", \"credentials\": \"$SA_TOKEN\"},
                \"tlsConfig\": {\"insecureSkipVerify\": true}
              }
            }")

          echo "Result: $RESULT"

          # Fail if error is returned
          echo "$RESULT" | grep -q '"message"' && exit 1 || exit 0