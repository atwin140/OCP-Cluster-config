apiVersion: observability.openshift.io/v1alpha1
kind: UIPlugin
metadata:
  name: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  type: Monitoring
  monitoring:
    perses:
      enabled: true
    acm:
      enabled: true
      alertmanager:
        url: 'https://alertmanager.open-cluster-management-observability.svc:9095'
      thanosQuerier:
        url: 'https://rbac-query-proxy.open-cluster-management-observability.svc:8443'
---
apiVersion: v1
kind: Secret
metadata:
  name: perses-sa-token
  namespace: openshift-cluster-observability-operator
  annotations:
    kubernetes.io/service-account.name: perses-sa
    argocd.argoproj.io/sync-wave: "4"
type: kubernetes.io/service-account-token
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: thanos-ruler-custom-rules
  namespace: open-cluster-management-observability
  annotations:
    argocd.argoproj.io/sync-wave: "3"
data:
  custom_rules.yaml: |
    groups:
      - name: cluster-health
        rules:
        - alert: ClusterMemoryOverestimation
          annotations:
            summary: Notify when Memory Overestimation is high
            description: "The cluster has a greater than 10% overestimation of memory usage: {{ $value }} for {{ $labels.cluster }}."
          expr: |
            topk(50, cluster:memory_requested:ratio - ignoring(usage) cluster:memory_utilized:ratio) > 0.1
          for: 5s
          labels:
            severity: warning
