# Selects all non-local managed clusters to register with ArgoCD.
# Add label selectors here to restrict which clusters get registered.
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: argocd-clusters
  namespace: openshift-gitops
spec:
  predicates:
  - requiredClusterSelector:
      labelSelector:
        matchExpressions:
        - key: local-cluster
          operator: DoesNotExist
