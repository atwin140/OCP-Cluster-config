apiVersion: batch/v1
kind: Job
metadata:
  name: minio-create-observability-bucket
  namespace: open-cluster-management-observability
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  backoffLimit: 6
  template:
    spec:
      serviceAccountName: minio
      securityContext:
        runAsUser: 0
      restartPolicy: OnFailure
      containers:
      - name: mc
        image: quay.io/minio/mc:latest
        command:
        - /bin/sh
        - -c
        - |
          set -eu
          until mc alias set local http://minio.open-cluster-management-observability.svc.cluster.local:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do
            echo "waiting for minio"
            sleep 5
          done
          mc mb --ignore-existing local/observability-thanos
        env:
        - name: HOME
          value: /tmp
        - name: MINIO_ROOT_USER
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: rootUser
        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: rootPassword
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
