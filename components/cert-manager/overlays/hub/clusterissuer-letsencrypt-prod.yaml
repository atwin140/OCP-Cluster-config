apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  acme:
    email: sharkbaitdev01@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod
    server: https://acme-v02.api.letsencrypt.org/directory
    solvers:
    - dns01:
        cloudflare:
          apiTokenSecretRef:
            key: api-token
            # Secret must be created manually in the cert-manager namespace:
            # oc create secret generic cloudflare-api-token-secret \
            #   --from-literal=api-token=<YOUR_TOKEN> -n cert-manager
            name: cloudflare-api-token-secret
