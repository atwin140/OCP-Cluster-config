apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-keycloak-manager
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "2"
rules:
- apiGroups:
  - k8s.keycloak.org
  resources:
  - keycloaks
  - keycloaks/status
  - keycloaks/finalizers
  - keycloakrealmimports
  - keycloakrealmimports/status
  - keycloakrealmimports/finalizers
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
