apiVersion: v1
kind: Secret
metadata:
  name: keycloak-db-secret
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "1"
type: Opaque
stringData:
  # Generate a strong password: openssl rand -base64 32
  # This value must be set before applying. Never commit a real password to Git.
  username: keycloak
  password: CHANGE_THIS_TO_A_STRONG_PASSWORD
