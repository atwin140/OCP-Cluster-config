# Headless Service — required by the StatefulSet for stable DNS (keycloak-postgresql-0.keycloak-postgresql)
apiVersion: v1
kind: Service
metadata:
  name: keycloak-postgresql
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: keycloak-postgresql
    app.kubernetes.io/component: database
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: keycloak-postgresql
  ports:
  - name: postgresql
    port: 5432
    targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: keycloak-postgresql
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: keycloak-postgresql
    app.kubernetes.io/component: database
spec:
  replicas: 1
  serviceName: keycloak-postgresql
  selector:
    matchLabels:
      app.kubernetes.io/name: keycloak-postgresql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak-postgresql
        app.kubernetes.io/component: database
    spec:
      containers:
      - name: postgresql
        # Red Hat RHEL9 PostgreSQL 15 image — supports arbitrary UID (OCP SCC compliant)
        image: registry.redhat.io/rhel9/postgresql-15:latest
        ports:
        - name: postgresql
          containerPort: 5432
        env:
        - name: POSTGRESQL_USER
          valueFrom:
            secretKeyRef:
              name: keycloak-db-secret
              key: username
        - name: POSTGRESQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: keycloak-db-secret
              key: password
        - name: POSTGRESQL_DATABASE
          value: keycloak
        volumeMounts:
        - name: data
          mountPath: /var/lib/pgsql/data
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        readinessProbe:
          exec:
            command:
            - /usr/libexec/check-container
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          exec:
            command:
            - /usr/libexec/check-container
            - --live
          initialDelaySeconds: 30
          periodSeconds: 20
          failureThreshold: 3
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 5Gi
      # storageClassName: ""  # Uncomment and set to override the cluster default StorageClass
