apiVersion: k8s.keycloak.org/v2alpha1
kind: KeycloakRealmImport
metadata:
  name: hub-keycloak-realm-openshift
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  keycloakCRName: hub-keycloak
  realm:
    realm: openshift
    displayName: OpenShift
    enabled: true
    sslRequired: external
    registrationAllowed: false
    bruteForceProtected: true
    clients:
    - clientId: openshift
      name: OpenShift
      description: OpenShift OAuth integration
      enabled: true
      protocol: openid-connect
      publicClient: false
      # Must match openshift-config/keycloak-oidc-client-secret (clientSecret key).
      secret: "CHANGE_ME"
      standardFlowEnabled: true
      implicitFlowEnabled: false
      directAccessGrantsEnabled: false
      serviceAccountsEnabled: false
      redirectUris:
      - "https://oauth-openshift.apps.acm.sharkbait.tech/oauth2callback/keycloak"
      webOrigins:
      - "+"
      attributes:
        pkce.code.challenge.method: S256
    groups:
    - name: openshift-access
    - name: cluster-admins
      path: /openshift-access/cluster-admins
    clientScopes:
    - name: groups
      description: OpenShift group membership
      protocol: openid-connect
      attributes:
        include.in.token.scope: "true"
      protocolMappers:
      - name: groups
        protocol: openid-connect
        protocolMapper: oidc-group-membership-mapper
        config:
          full.path: "true"
          id.token.claim: "true"
          access.token.claim: "true"
          userinfo.token.claim: "true"
          claim.name: groups
