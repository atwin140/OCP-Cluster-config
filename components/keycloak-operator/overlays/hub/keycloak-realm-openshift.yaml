apiVersion: k8s.keycloak.org/v2alpha1
kind: KeycloakRealmImport
metadata:
  name: hub-keycloak-realm-openshift
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  keycloakCRName: hub-keycloak
  placeholders:
    CLIENT_SECRET:
      secret:
        name: hub-keycloak-realm-config
        key: clientSecret
  realm:
    realm: openshift
    displayName: OpenShift
    enabled: true
    sslRequired: external
    registrationAllowed: false
    bruteForceProtected: true
    clients:
    - clientId: openshift
      name: OpenShift
      description: OpenShift OAuth integration
      enabled: true
      protocol: openid-connect
      publicClient: false
      secret: "${CLIENT_SECRET}"
      standardFlowEnabled: true
      implicitFlowEnabled: false
      directAccessGrantsEnabled: false
      serviceAccountsEnabled: false
      redirectUris:
      - "https://oauth-openshift.apps.acm.sharkbait.tech/oauth2callback/keycloak"
      - "https://oauth-openshift.apps.cluster01.sharkbait.tech/oauth2callback/keycloak"
      - "https://oauth-openshift.apps.cluster02.sharkbait.tech/oauth2callback/keycloak"
      - "https://oauth-openshift.apps.cluster03.sharkbait.tech/oauth2callback/keycloak"
      - "https://oauth-openshift.apps.cluster04.sharkbait.tech/oauth2callback/keycloak"
      webOrigins:
      - "+"
      defaultClientScopes:
      - profile
      - email
      optionalClientScopes:
      - address
      - phone
      - groups
    groups:
    - name: openshift-access
      subGroups:
      - name: cluster-admins
    clientScopes:
    - name: email
      description: OpenID Connect built-in scope
      protocol: openid-connect
      attributes:
        include.in.token.scope: "true"
        display.on.consent.screen: "true"
      protocolMappers:
      - name: email
        protocol: openid-connect
        protocolMapper: oidc-usermodel-attribute-mapper
        consentRequired: false
        config:
          userinfo.token.claim: "true"
          user.attribute: email
          id.token.claim: "true"
          access.token.claim: "true"
          claim.name: email
          jsonType.label: String
      - name: email verified
        protocol: openid-connect
        protocolMapper: oidc-usermodel-attribute-mapper
        consentRequired: false
        config:
          userinfo.token.claim: "true"
          user.attribute: emailVerified
          id.token.claim: "true"
          access.token.claim: "true"
          claim.name: email_verified
          jsonType.label: boolean
    - name: profile
      description: OpenID Connect built-in scope
      protocol: openid-connect
      attributes:
        include.in.token.scope: "true"
        display.on.consent.screen: "true"
      protocolMappers:
      - name: username
        protocol: openid-connect
        protocolMapper: oidc-usermodel-attribute-mapper
        consentRequired: false
        config:
          userinfo.token.claim: "true"
          user.attribute: username
          id.token.claim: "true"
          access.token.claim: "true"
          claim.name: preferred_username
          jsonType.label: String
      - name: full name
        protocol: openid-connect
        protocolMapper: oidc-full-name-mapper
        consentRequired: false
        config:
          id.token.claim: "true"
          access.token.claim: "false"
          userinfo.token.claim: "true"
      - name: given name
        protocol: openid-connect
        protocolMapper: oidc-usermodel-attribute-mapper
        consentRequired: false
        config:
          userinfo.token.claim: "true"
          user.attribute: firstName
          id.token.claim: "true"
          access.token.claim: "true"
          claim.name: given_name
          jsonType.label: String
      - name: family name
        protocol: openid-connect
        protocolMapper: oidc-usermodel-attribute-mapper
        consentRequired: false
        config:
          userinfo.token.claim: "true"
          user.attribute: lastName
          id.token.claim: "true"
          access.token.claim: "true"
          claim.name: family_name
          jsonType.label: String
    - name: address
      description: OpenID Connect built-in scope
      protocol: openid-connect
      attributes:
        include.in.token.scope: "true"
        display.on.consent.screen: "true"
    - name: phone
      description: OpenID Connect built-in scope
      protocol: openid-connect
      attributes:
        include.in.token.scope: "true"
        display.on.consent.screen: "true"
    - name: groups
      description: OpenShift group membership
      protocol: openid-connect
      attributes:
        include.in.token.scope: "true"
        display.on.consent.screen: "false"
        consent.screen.text: ""
      protocolMappers:
      - name: groups
        protocol: openid-connect
        protocolMapper: oidc-group-membership-mapper
        consentRequired: false
        config:
          full.path: "false"
          id.token.claim: "true"
          access.token.claim: "true"
          userinfo.token.claim: "true"
          claim.name: groups
