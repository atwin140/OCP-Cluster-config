---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: keycloak-postgresql-backup
  namespace: keycloak
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 30Gi
  storageClassName: nas-iscsi-ext4-vol2
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: keycloak-postgresql-backup
  namespace: keycloak
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
          - name: pg-backup
            image: bitnami/postgresql:latest
            command:
            - /bin/sh
            - -c
            - |
              set -e
              TIMESTAMP=$(date +%Y%m%d-%H%M%S)
              BACKUP_FILE="/backup/keycloak-${TIMESTAMP}.sql"
              echo "Starting backup to ${BACKUP_FILE}"
              pg_dump -h keycloak-postgresql -U $PGUSER -d $PGDATABASE --clean --if-exists > "${BACKUP_FILE}"
              echo "Backup complete: $(du -sh ${BACKUP_FILE})"
              # Prune backups older than 30 days
              find /backup -name "keycloak-*.sql" -mtime +30 -delete
              echo "Old backups pruned."
            env:
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: keycloak-db-secret
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-db-secret
                  key: password
            - name: PGDATABASE
              value: keycloak
            volumeMounts:
            - name: backup-storage
              mountPath: /backup
          volumes:
          - name: backup-storage
            persistentVolumeClaim:
              claimName: keycloak-postgresql-backup
