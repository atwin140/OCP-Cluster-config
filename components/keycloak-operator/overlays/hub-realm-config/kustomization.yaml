apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../hub
- realm-config-secret.yaml

replacements:
- source:
    kind: Secret
    name: hub-keycloak-realm-config
    fieldPath: stringData.clientSecret
  targets:
  - select:
      group: k8s.keycloak.org
      version: v2alpha1
      kind: KeycloakRealmImport
      name: hub-keycloak-realm-openshift
    fieldPaths:
    - spec.realm.clients.0.secret
- source:
    kind: Secret
    name: hub-keycloak-realm-config
    fieldPath: stringData.redirectUri
  targets:
  - select:
      group: k8s.keycloak.org
      version: v2alpha1
      kind: KeycloakRealmImport
      name: hub-keycloak-realm-openshift
    fieldPaths:
    - spec.realm.clients.0.redirectUris.0
- source:
    kind: Secret
    name: hub-keycloak-realm-config
    fieldPath: stringData.webOrigin
  targets:
  - select:
      group: k8s.keycloak.org
      version: v2alpha1
      kind: KeycloakRealmImport
      name: hub-keycloak-realm-openshift
    fieldPaths:
    - spec.realm.clients.0.webOrigins.0
