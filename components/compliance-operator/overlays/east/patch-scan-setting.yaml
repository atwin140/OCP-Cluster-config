# East cluster ScanSetting patch.
# Scan at 01:00 UTC (21:00 ET, off-peak) using gp3-csi (AWS EBS GP3).
apiVersion: compliance.openshift.io/v1alpha1
kind: ScanSetting
metadata:
  name: stig-scan-setting
  namespace: openshift-compliance
spec:
  schedule: "0 1 * * *"
  rawResultStorage:
    pvAccessModes:
    - ReadWriteOnce
    rotation: 3
    size: 1Gi
    storageClassName: gp3-csi
