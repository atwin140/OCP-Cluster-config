# Lab cluster ScanSetting patch.
# Scan every 6 hours for faster policy iteration; use standard storage class.
apiVersion: compliance.openshift.io/v1alpha1
kind: ScanSetting
metadata:
  name: stig-scan-setting
  namespace: openshift-compliance
spec:
  schedule: "0 */6 * * *"
  rawResultStorage:
    pvAccessModes:
    - ReadWriteOnce
    rotation: 2
    size: 1Gi
    storageClassName: standard
