# West cluster ScanSetting patch.
# Scan at 02:00 UTC (19:00 PT, off-peak) using gp3-csi (AWS EBS GP3).
apiVersion: compliance.openshift.io/v1alpha1
kind: ScanSetting
metadata:
  name: stig-scan-setting
  namespace: openshift-compliance
spec:
  schedule: "0 2 * * *"
  rawResultStorage:
    pvAccessModes:
    - ReadWriteOnce
    rotation: 3
    size: 1Gi
    storageClassName: gp3-csi
