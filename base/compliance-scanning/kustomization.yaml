# Base Kustomize manifest.
# Both overlays (east, west) reference this base via ../../base/compliance-scanning.
# No namespace or environment-specific values live here; those are injected by
# the overlay kustomization and its patches.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: openshift-compliance

resources:
- scan-setting.yaml
- scan-setting-binding.yaml
