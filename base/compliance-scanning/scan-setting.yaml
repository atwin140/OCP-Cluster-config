# ScanSetting – base configuration for all clusters.
# autoApplyRemediations is false: remediations are reviewed manually in Git
# before being applied (controlled remediation workflow).
# strictNodeScan: true aborts the scan if it cannot determine all node roles
# rather than silently skipping nodes, giving a clearer failure signal.
# rawResultStorage keeps 3 rotations of raw ARF result PVCs (1 Gi each).
# scanTolerations ensures the scan pod is scheduled on master nodes that carry
# the default NoSchedule taint.
apiVersion: compliance.openshift.io/v1alpha1
kind: ScanSetting
metadata:
  name: stig-scan-setting
  namespace: openshift-compliance
  labels:
    app.kubernetes.io/part-of: compliance-scanning
    app.kubernetes.io/managed-by: argocd
  annotations:
    # Wave 1: ScanSetting must exist before ScanSettingBinding (wave 2).
    argocd.argoproj.io/sync-wave: "1"
spec:
  # Safety: never auto-apply remediations – all changes go through Git review.
  autoApplyRemediations: false
  autoUpdateRemediations: false

  # Fail fast if the operator cannot enumerate all nodes for a role.
  strictNodeScan: true

  # Scan both control-plane and compute nodes.
  roles:
  - master
  - worker

  # Default scan schedule (UTC). Override per-cluster via overlay patch.
  schedule: "0 1 * * *"

  # Tolerate the master NoSchedule taint so scan pods can run on control-plane nodes.
  scanTolerations:
  - effect: NoSchedule
    key: node-role.kubernetes.io/master
    operator: Exists

  # Raw ARF result storage: 3 rotations × 1 Gi PVC per node (ReadWriteOnce).
  # storageClassName is intentionally omitted here to use the cluster default;
  # overlay patches supply a cluster-specific storage class.
  rawResultStorage:
    pvAccessModes:
    - ReadWriteOnce
    rotation: 3
    size: 1Gi
